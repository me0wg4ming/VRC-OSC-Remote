[general]
role = sub
; Sub: single key only
key = YOUR_KEY_HERE
; Dom: multiple keys comma-separated
keys = YOUR_KEY_HERE

[osc]
send_port = 9000
recv_port = 9001

[filter]
; Parameter prefixes that will NOT be sent to dom
blacklist_prefix = VF74_, VF73_, VF68_, VF_, VF , OGB/, bOSC/, Leash_, Tail_, grableash, hr_, Go/, M_, Gesture, Viseme, Voice, InStation, Seated, AFK, Upright, Earmuffs, ScaleModified, ScaleFactor, ScaleFactorInverse, EyeHeightAsMeters, EyeHeightAsPercent, VelocityX, VelocityY, VelocityZ, VelocityMagnitude, AngularY, Grounded, TrackingType, VRMode, IsOnFriendsList, IsAnimatorEnabled, PreviewMode, MuteSelf, VFH/, VF1
; Throttle for float/int updates in milliseconds (0 = no throttle)
float_throttle_ms = 150

[paths]
; VRChat OSC config folder (leave empty for auto-detection)
; Example: C:\Users\YourName\AppData\LocalLow\VRChat\VRChat\OSC
vrchat_osc_path =
